<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<link rel="icon" href="data:," />
<title>記号生命進化シミュレーター — Symbolic Shapes v1</title>
<style>
  :root{ --bg1:#0c1445; --bg2:#1a2980; --panel:#111827cc; --panel-border:#2a3352; --text:#e8eefc; --muted:#9fb3d1; --warn:#ff6b6b; --ok:#50fa7b; --amber:#f7b731; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{ margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text);
    background: radial-gradient(1000px 600px at 20% -10%, #26326866, transparent 60%), linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%); overflow:hidden; transition: background 0.6s ease; }
  .wrap{ display:grid; grid-template-columns: 1fr 360px; gap:16px; height:100%; padding:16px; }
  #viewport{ width:100%; height:100%; display:block; border-radius:12px; background:#020617; box-shadow: inset 0 0 0 1px #0b132b; touch-action:none; }
  .panel{ height:100%; overflow:auto; background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:14px; backdrop-filter: blur(6px); }
  h1{font-size:1.05rem; letter-spacing:.02em; margin:2px 0 10px; font-weight:700}
  .row{display:flex; gap:10px; margin:10px 0; flex-wrap:wrap}
  .btn{ appearance:none; border:1px solid #2d3a68; background:#0b122a; color:var(--text); padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:600; transition:.15s; }
  .btn:disabled{opacity:.5; cursor:not-allowed}
  .btn:hover{transform:translateY(-1px)}

  .btn.on{ border-color:#4fa3ff; box-shadow: 0 0 0 1px rgba(79,163,255,0.25), inset 0 0 0 1px rgba(79,163,255,0.15); }
  .dot.amb{background:#b06cff}
  .dot.pack{background:#ff4b4b}
  .dot.scav{background:#ffd166}
  .dot.filt{background:#46f4a5}
  .dot.oth{background:#6ecbff}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .control{margin:8px 0 14px}
  label{font-size:.86rem; color:var(--muted); display:flex; align-items:center; justify-content:space-between}
  .value{font-weight:700; color:#9bd0ff}
  input[type="range"]{width:100%}
  .stats{display:grid; grid-template-columns:1fr; gap:8px; margin:4px 0 10px}
  .stat{background:#0b122a; border:1px solid #1b2548; border-radius:10px; padding:10px}
  .stat .k{font-size:.78rem; color:var(--muted)}
  .stat .v{font-weight:800; font-feature-settings:"tnum"; letter-spacing:.02em}
  .log{height:28vh; overflow:auto; background:#071022; border:1px solid #142046; padding:10px; border-radius:10px; font-size:.9rem; line-height:1.4}
  .mini{height:120px; border:1px solid #142046; border-radius:10px; background:#070e22; display:block; width:100%;}
  .pill{display:inline-flex; align-items:center; gap:6px; padding:2px 8px; border-radius:999px; font-size:.72rem; border:1px solid #274; color:#bdf; background:#0a1a2a}
  .hint{color:#9db6e8; font-size:.8rem; margin-top:6px}
  .toolmenu{ position:absolute; display:none; right:14px; top:80px; background:#0a1229; border:1px solid #1b2550; border-radius:12px; padding:8px; box-shadow:0 8px 24px rgba(0,0,0,.35); z-index:20; }
  .toolmenu button{ display:flex; align-items:center; gap:8px; width:200px; margin:4px 0; background:#0b122a; border:1px solid #1b2548; color:#dbe7ff; padding:8px 10px; border-radius:10px; cursor:pointer }
  .legend{display:flex; gap:8px; margin:6px 0 0}
  .dot{width:10px; height:10px; border-radius:2px; display:inline-block}
  .dot.herb{background:#7bdff2}
  .dot.omni{background:#f7b731}
  .dot.carn{background:#ff4242}
  @media (max-width:980px){
    body{ overflow:auto; overscroll-behavior:none; }
    .wrap{ height:auto; min-height:100dvh; grid-template-columns:1fr; grid-template-rows:minmax(68dvh,72dvh) auto; gap:8px; padding:8px; }
    #viewport{ border-radius:8px; }
    .panel{ height:auto; max-height:none; padding:10px; border-radius:10px; }
    .btn{ min-height:44px; padding:10px 8px; }
    .log{height:18vh}
    .toolmenu{ position:fixed; right:8px; top:auto; bottom:12px; }
  }
  @media (max-width:520px){
    .wrap{ grid-template-rows:76dvh auto; }
    h1{ font-size:.95rem; }
    .row{ gap:8px; margin:8px 0; }
    .grid2{ gap:6px; }
    .mini{ height:96px; }
    #species-cards{ max-height:20vh !important; }
  }
  .toasts{ position:fixed; top:8px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; gap:4px; z-index:12; pointer-events:none; }
  .toast{ background:rgba(10,18,41,0.45); border:1px solid #1b2550; color:#dbe7ff; padding:4px 8px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.18); font-weight:600; font-size:.76rem; letter-spacing:.01em; opacity:0; transform:translateY(-6px); transition: opacity .16s ease, transform .16s ease; }
  .toast.show{ opacity:1; transform:translateY(0) }
  .toast.species{ border-color:#4fa3ff }
  .toast.season{ border-color:#8bd37b }
  .toast.event{ border-color:#ffae42 }
  .species-card { padding:8px; border:1px solid #2a3352; background:#0b122a; border-radius:10px; margin-bottom:6px; }
  .species-card-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .species-avatar { width:28px; height:28px; }
  .species-key { flex:1; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .species-diet { opacity:0.8; }
  .species-stats { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .species-trend { opacity:0.8; }
  .species-bar { height:6px; background:linear-gradient(90deg, #98c0ff var(--value, 0%), rgba(255,255,255,.10) var(--value, 0%)); border-radius:4px; margin:2px 0; }
  .species-details { display:none; padding-top:6px; font-size:.9rem; color:var(--muted); }
  #debug-console{position:fixed; top:0; left:0; right:0; background:rgba(0,0,0,.7); color:#fff; font:12px/1.4 monospace; padding:6px 8px; display:none; z-index:1000;}
</style>
</head>
<body>
<div id="debug-console"></div>
<div id="toasts" class="toasts"></div>
<div class="wrap">
  <canvas id="viewport"></canvas>
  <aside class="panel">
    <h1>記号生命進化シミュレーター</h1>
    <div class="row grid2">
      <button id="start-btn" class="btn">▶ 開始</button>
      <button id="pause-btn" class="btn" disabled>⏸ 一時停止</button>
      <button id="reset-btn" class="btn">↺ リセット</button>
      <button id="tool-btn" class="btn" title="長押しでツール切替">＋ エサ追加</button>
      <button id="save-btn" class="btn">💾 セーブ</button>
      <button id="load-btn" class="btn">📂 ロード</button>
      <button id="copy-brief-btn" class="btn" style="grid-column:1 / -1">Codex用に状態コピー</button>
    </div>

    <div class="row">
      <button id="roleviz-btn" class="btn" style="width:100%">🎭 ロール色分け: OFF</button>
    </div>
    <div id="role-legend" class="legend" style="display:none; flex-wrap:wrap; margin-top:-4px; margin-bottom:6px">
      <span class="dot amb"></span><span class="hint">待ち伏せ</span>
      <span class="dot pack"></span><span class="hint">群れ狩り</span>
      <span class="dot scav"></span><span class="hint">スカベンジャー</span>
      <span class="dot filt"></span><span class="hint">濾過食</span>
      <span class="dot oth"></span><span class="hint">その他</span>
    </div>


    <div class="control">
      <label>昼夜サイクル <span id="daynight-label" class="value">昼</span></label>
      <div style="position:relative;height:10px;border:1px solid var(--panel-border);border-radius:8px;background:#0b122a;overflow:hidden">
        <div id="daynight-bar" style="position:absolute;left:0;top:0;height:100%;width:0%;background:linear-gradient(90deg,#ffe082,#80d8ff)"></div>
      </div>
    </div>

    <div class="control">
      <label>シミュレーション速度 <span class="value" id="speed-value">1x</span></label>
      <input id="speed-slider" type="range" min="1" max="4" step="1" value="1" />
    </div>

    <div class="control">
      <label>突然変異の強さ <span class="value" id="mutation-value">5%</span></label>
      <input id="mutation-slider" type="range" min="0" max="20" step="1" value="5" />
    </div>

    <div class="control">
      <label>個体数上限 <span class="value" id="popmax-value">120</span></label>
      <input id="popmax-slider" type="range" min="30" max="200" step="10" value="120" />
    </div>

    <div class="stats">
      <div class="stat"><div class="k">世代</div><div class="v" id="generation">1</div></div>
    </div>

    <div class="control">
      <label>種別シェア（リアルタイム）<span class="value pill" id="tool-pill">ツール: エサ</span></label>
      <canvas id="mix-canvas" class="mini"></canvas>
      <div class="legend">
        <span class="dot herb"></span><span class="hint">草食</span>
        <span class="dot omni"></span><span class="hint">雑食</span>
        <span class="dot carn"></span><span class="hint">肉食</span>
      </div>
    </div>

    <div class="control">
      <div class="k" style="margin:8px 0 6px; color:var(--muted)">系統ビュー <span class="hint" style="margin-left:8px">MST＝類似分布 / 系統＝血縁推定</span></div>
      <div style="display:flex; gap:6px; margin-bottom:6px;">
        <button id="phy-tab-mst" class="pill" style="padding:2px 8px; border:1px solid var(--panel-border); background:var(--panel); cursor:pointer;">MST</button>
        <button id="phy-tab-lineage" class="pill" style="padding:2px 8px; border:1px solid var(--panel-border); background:#0b122a; cursor:pointer;">系統</button>
      </div>
      <canvas id="phylo-canvas" width="240" height="140" style="width:100%;height:auto; border-radius:10px; background:rgba(10,18,41,.22);"></canvas>
      <div id="species-cards" style="margin-top:8px; display:grid; grid-template-columns:1fr; gap:6px; max-height:28vh; overflow:auto;"></div>
    </div>

    <div class="control">
      <div class="k" style="margin:8px 0 6px; color:var(--muted)">進化ログ</div>
      <div id="evolution-log" class="log">Symbolic Shapes v1：図形の連なり、分岐、核、透明グラデーションで個体差を表現。</div>
      <div class="hint">※ キャンバスをタップ／クリックで効果適用。長押しでツール選択。Hでリング表示。</div>
    </div>

    <div id="tool-menu" class="toolmenu">
      <button data-tool="food">🍞 エサ（既定）</button>
      <button data-tool="repel">💨 リペレント煙</button>
      <button data-tool="mutagen">☢ ミュータジェン・パルス</button>
    </div>
  </aside>
</div>

<script>
(function(){
  'use strict';
  const $=id=>document.getElementById(id);

  // ===== Canvas / Context =====
  const view = $('viewport');
  const ctx = view.getContext('2d', { willReadFrequently: true });
  let W=0,H=0; const DPR=Math.min(2, window.devicePixelRatio||1);
  function resize(){ const r=view.getBoundingClientRect(); W=r.width; H=r.height; view.width=Math.round(W*DPR); view.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); if(window.env) window.env.ensure(); }
  window.addEventListener('resize',resize,{passive:true}); resize();
  const TAU=Math.PI*2; const rnd=(a,b)=>Math.random()*(b-a)+a; const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)); const clamp01=(x)=>clamp(x,0,1); const lerp=(a,b,t)=>a+(b-a)*t; const sigmoid=x=>1/(1+Math.exp(-x));
  const hash01 = (s)=>{ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return (h>>>0)/2**32; };

  // ===== UI State =====
  const ui={ speed:1, mutation:0.05, showSense:false, tool:'food', popMax:120, parallax:1.0, roleViz:false };
  $('speed-slider').addEventListener('input',e=>{ ui.speed=+e.target.value; $('speed-value').textContent=ui.speed+'x'; });
  $('mutation-slider').addEventListener('input',e=>{ ui.mutation=(+e.target.value)/100; $('mutation-value').textContent=e.target.value+'%'; });
  $('popmax-slider').addEventListener('input',e=>{ ui.popMax=+e.target.value; $('popmax-value').textContent=String(ui.popMax); });
  window.addEventListener('keydown',ev=>{ if(ev.key==='h'||ev.key==='H') ui.showSense=!ui.showSense; });

  // ===== Role visualization (color by role) =====
  const ROLE_RGBA = {
    ambusher:'rgba(176,108,255,', // purple
    pack:'rgba(255,75,75,',      // strong red
    scav:'rgba(255,209,102,',    // amber
    filter:'rgba(70,244,165,',   // green
    other:'rgba(110,203,255,'    // cyan
  };
  const ROLE_HUE = { ambusher:285, pack:6, scav:45, filter:145, other:200 };

  const roleBtn = $('roleviz-btn');
  const roleLegend = $('role-legend');
  function syncRoleVizUI(){
    if(!roleBtn) return;
    roleBtn.textContent = ui.roleViz ? '🎭 ロール色分け: ON' : '🎭 ロール色分け: OFF';
    roleBtn.classList.toggle('on', ui.roleViz);
    if(roleLegend) roleLegend.style.display = ui.roleViz ? 'flex' : 'none';
  }
  if(roleBtn){
    roleBtn.addEventListener('click', ()=>{ ui.roleViz = !ui.roleViz; syncRoleVizUI(); });
    syncRoleVizUI();
  }


  // ===== Toast =====
  let frame=0;
  const toastsEl = $('toasts');
  const recentToast = new Map();
  let toastBlockUntil=0;
  function showToast(type, text){
    if(frame < toastBlockUntil) return;
    const key = type+':'+text; const now = frame;
    if(recentToast.has(key) && now - recentToast.get(key) < 900) return;
    recentToast.set(key, now);
    const el = document.createElement('div'); el.className = 'toast '+type; el.textContent = text;
    toastsEl.appendChild(el);
    requestAnimationFrame(()=> el.classList.add('show'));
    setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=> el.remove(), 200); }, 1200);
    while(toastsEl.children.length>1){ toastsEl.removeChild(toastsEl.firstChild); }
  }

  // ===== Spatial Grid =====
  let GS=64; let GW=0, GH=0; let gOrg=[];
  function ensureGrid(){ const w=Math.max(1, Math.ceil(W/GS)), h=Math.max(1, Math.ceil(H/GS)); if(w!==GW||h!==GH||!gOrg.length){ GW=w; GH=h; gOrg = new Array(GW*GH); for(let i=0;i<gOrg.length;i++) gOrg[i]=[]; } }
  function autoAdjustGrid(){
    try{
      const pop = organisms?.length||0;
      if(pop<=0) return;
      const targetPerCell = 6;
      const area = W*H;
      const estimate = Math.sqrt(area/(targetPerCell*pop));
      const newGS = Math.max(18, Math.min(64, Math.round(estimate)));
      if (newGS !== GS){ GS = newGS; ensureGrid(); }
    }catch(_){}
  }

  function clearGrid(){ for(let i=0;i<gOrg.length;i++) gOrg[i].length=0; }
  function cellIndex(x,y){ const cx= Math.min(GW-1, Math.max(0, (x/GS)|0)); const cy= Math.min(GH-1, Math.max(0, (y/GS)|0)); return cy*GW + cx; }
  function buildSpatialIndex(){ ensureGrid(); clearGrid(); for(const o of organisms){ gOrg[cellIndex(o.x,o.y)].push(o); } }
  function forEachOrgNeighbors(x,y,r,fn){ const r2=r*r; let __hits=0; const __MAX_HITS=24; const minx=Math.max(0, ((x-r)/GS)|0), maxx=Math.min(GW-1, ((x+r)/GS)|0); const miny=Math.max(0, ((y-r)/GS)|0), maxy=Math.min(GH-1, ((y+r)/GS)|0); for(let cy=miny; cy<=maxy; cy++){ for(let cx=minx; cx<=maxx; cx++){ const arr=gOrg[cy*GW+cx]; for(let i=0;i<arr.length;i++){ const o=arr[i]; const dx=o.x - x, dy=o.y - y; const d2=dx*dx+dy*dy; if(d2<=r2) fn(o,dx,dy,d2); if(++__hits>=__MAX_HITS) return; } } } }

  // ===== Entities =====
  class Food{
  constructor(x,y,type='small'){
    this.x=x; this.y=y; this.type=type;
    if(type==='small'){ this.r=2.2; this.gain=16; this.color='#8be9fd'; }
    else if(type==='big'){ this.r=4.6; this.gain=40; this.color='#fcbf49'; }
    else if(type==='algae'){ this.r=3.0; this.gain=22; this.color='#3ddc84'; }
    else if(type==='detritus'){ this.r=3.2; this.gain=18; this.color='#c9a46b'; }
    else { this.r=2.6; this.gain=16; this.color='#ffffff'; }
  }
  draw(ctx){
    ctx.save();
    ctx.translate(this.x,this.y);
    if(this.type==='algae'){
      const g=ctx.createRadialGradient(-this.r*0.25,-this.r*0.25,0.4,0,0,this.r*2.0);
      g.addColorStop(0,'rgba(190,255,190,0.78)');
      g.addColorStop(0.45,'rgba(62,220,132,0.52)');
      g.addColorStop(1,'rgba(20,110,80,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,this.r*1.8,0,TAU); ctx.fill();
      ctx.strokeStyle='rgba(205,255,210,0.38)'; ctx.lineWidth=0.8; ctx.beginPath(); ctx.arc(0,0,this.r*0.95,0,TAU); ctx.stroke();
    } else if(this.type==='detritus'){
      const g=ctx.createRadialGradient(-this.r*0.25,-this.r*0.3,0.3,0,0,this.r*1.3);
      g.addColorStop(0,'rgba(230,195,140,0.82)');
      g.addColorStop(1,'rgba(92,58,42,0.74)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,this.r,0,TAU); ctx.fill();
      ctx.fillStyle='rgba(255,235,190,0.26)'; ctx.beginPath(); ctx.arc(-this.r*0.25,-this.r*0.2,Math.max(0.5,this.r*0.28),0,TAU); ctx.fill();
    } else {
      const g=ctx.createRadialGradient(-this.r*0.25,-this.r*0.25,0.3,0,0,this.r*1.5);
      g.addColorStop(0,'rgba(255,255,255,0.88)');
      g.addColorStop(0.4,this.type==='big'?'rgba(255,214,88,0.78)':'rgba(130,240,255,0.72)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,this.r*1.5,0,TAU); ctx.fill();
      ctx.fillStyle=this.color; ctx.globalAlpha=0.72; ctx.beginPath(); ctx.arc(0,0,this.r*0.65,0,TAU); ctx.fill();
    }
    ctx.restore();
  }
}
  class Corpse{ constructor(x,y,energy){ this.x=x; this.y=y; this.energy=energy; this.radius=Math.min(10, 2 + energy*0.05); this.t=900; this.wob=Math.random()*TAU; }
    step(){ this.t -= (1 + (worldEvent.corpseDecayExtra||0)); this.wob+=0.03; this.energy*=0.999; if(this.energy<2) this.t=0; }
    draw(ctx){ const k=Math.max(0,this.t/900); const r=this.radius*(0.9+0.1*Math.sin(this.wob)); const grad=ctx.createRadialGradient(this.x+1.5,this.y-1.5,1,this.x,this.y,r); grad.addColorStop(0,`rgba(210,180,140,${0.9*k})`); grad.addColorStop(1,`rgba(120,80,50,${0.85*k})`); ctx.beginPath(); ctx.fillStyle=grad; ctx.arc(this.x,this.y,r,0,TAU); ctx.fill(); ctx.strokeStyle='rgba(40,20,10,0.25)'; ctx.lineWidth=1; ctx.stroke(); } }
  class Plankton{ constructor(){ this.x=rnd(8,W-8); this.y=rnd(8,H-8); this.vx=rnd(-0.08,0.08); this.vy=rnd(-0.08,0.08); this.t= rnd(1200,2400); this.spin=rnd(0,TAU); this.kind=(Math.random()*3)|0;} step(){ this.x+=this.vx; this.y+=this.vy; this.spin+=0.015; if(this.x<6||this.x>W-6) this.vx*=-1; if(this.y<6||this.y>H-6) this.vy*=-1; if(--this.t<=0){ this.x=rnd(8,W-8); this.y=rnd(8,H-8); this.t=rnd(1200,2400);} } draw(ctx){
      const glow=dayNight.isNight?0.62:0.26;
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.spin);
      ctx.globalCompositeOperation=dayNight.isNight?'lighter':'source-over';
      const g=ctx.createRadialGradient(0,0,0.4,0,0,dayNight.isNight?7:4);
      g.addColorStop(0,`rgba(205,255,255,${glow})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,dayNight.isNight?7:4,0,TAU); ctx.fill();
      ctx.strokeStyle=`rgba(165,245,255,${dayNight.isNight?0.42:0.24})`;
      ctx.lineWidth=0.8;
      if(this.kind===0){ ctx.beginPath(); ctx.ellipse(0,0,2.4,1.1,0,0,TAU); ctx.stroke(); }
      else if(this.kind===1){ ctx.beginPath(); ctx.arc(0,0,2.0,0.25,TAU-0.25); ctx.stroke(); }
      else { ctx.beginPath(); ctx.moveTo(-2,0); ctx.lineTo(2,0); ctx.moveTo(0,-2); ctx.lineTo(0,2); ctx.stroke(); }
      ctx.restore();
    } }
  class Patch{ constructor(type,x,y,r){ this.type=type; this.x=x; this.y=y; this.r=r; }

    prepareSymbolDetails(){

      const chainLen = (rng()<solitaryChance)

        : Math.max(2, Math.min(13, Math.round(chainBase + longChainBonus)));
      const ringBody = chainLen>=5 && rng()<clamp(0.05 + this.genes.lobes*0.30 + this.genes.efficiency*0.16 + this.genes.reproduction*0.08 - this.genes.elongation*0.06, 0.04, 0.48);

      const spacing = this.size*(0.78 + 0.38*this.genes.elongation);

            y: wob,
            r: nodeR,
            shape: primaryIndex,
            hue: baseHue,

        }

        const side = rng()<0.5 ? -1 : 1;
        const len = 1 + Math.floor(rng()*(1 + this.genes.reproduction*3));

        let py = nodes[parent].y;

          const step = spacing*(0.72 + 0.28*rng());

          py += Math.sin(ang)*step;
          const parentIndex = j===0 ? parent : nodes.length-1;
          nodes.push({
            x:px, y:py,
            r:nodeR,
            shape: primaryIndex,
            hue:baseHue,
            alpha:0.38 + 0.30*this.genes.efficiency + 0.14*rng(),
            rot:rng()*TAU,
            parent:parentIndex,
            kind:'branch'
          });
        }
      }
      if(tipFork){
        const parent = mainLen-1;
        const prev = nodes[Math.max(0, mainLen-2)];
        const tip = nodes[parent];
        const baseAng = Math.atan2(tip.y-prev.y, tip.x-prev.x);
        for(const side of [-1,1]){
          const len = 1 + (rng()<0.34 + this.genes.reproduction*0.28 ? 1 : 0);
          let px = tip.x;
          let py = tip.y;
          let parentIndex = parent;
          for(let j=0;j<len;j++){
            const spread = 0.54 + rng()*0.36 + j*0.08;
            const ang = baseAng + side*spread + (rng()-0.5)*0.18;
            const step = spacing*(0.78 + 0.18*rng());

              r:nodeR,
              shape: primaryIndex,
              hue:baseHue,
              alpha:0.40 + 0.30*this.genes.efficiency + 0.12*rng(),

        nodes,
        extraLinks,

        personalSpaceR,
        primaryIndex,
        secondaryIndex,
        outlineHue: baseHue,
        lineAlpha: 0.16 + 0.24*this.genes.sensory,
        nucleusHue: pal.nucleusHue,
        gradientShift: pal.gradientShift,
        transparency: clamp(0.42 + 0.34*this.genes.efficiency - 0.12*this.genes.size, 0.30, 0.82),
        coreScale: 0.18 + 0.11*this.genes.reproduction,
        pulse: rng()*TAU,
        shapeRot: (rng()-0.5)*0.42,
        wiggleAmp: 0.14 + 0.54*this.genes.speed + 0.24*this.genes.sensory,

    }
    mutateGene(g,mag){ return clamp(g + (Math.random()*2-1)*mag,0,1); }
    inPatch(type){ if(!window.env) return null; const v=window.env.valueAt(type,this.x,this.y); return v>0.45 ? {v} : null; }
    separateFromNeighbors(){
      const selfR = this.personalSpaceR || this.size*1.12;
      let pushX=0, pushY=0, hits=0, deep=0;
      forEachOrgNeighbors(this.x,this.y,selfR + this.size*3.4,(o,dx,dy,d2)=>{
        if(o===this || o.dead) return;
        const otherR = o.personalSpaceR || o.size*1.12;
        const contact = (selfR + otherR) * 0.82;
        const soft = (selfR + otherR) * 1.06;
        if(d2>soft*soft) return;
        let d = Math.sqrt(d2);
        let nx, ny;
        if(d<0.001){
          const a = (this.id*12.9898 + o.id*78.233) % TAU;
          nx = Math.cos(a); ny = Math.sin(a); d = 0.001;
        } else {
          nx = -dx/d; ny = -dy/d;
        }
        let k = (soft-d)/soft;
        if(d<contact){
          k += ((contact-d)/contact)*1.25;
          deep++;
        }
        if(this.role==='ambusher' && this.energy < this.reproThreshold*0.52) k *= 0.55;
        pushX += nx*k;
        pushY += ny*k;
        hits++;
      });
      if(hits){
        const scale = clamp(0.030 + 0.018*hits + 0.026*deep, 0.025, 0.16);
        this.vx += pushX*scale;
        this.vy += pushY*scale;
        this.motionLevel = Math.max(this.motionLevel||0, clamp((hits + deep)*0.10,0,0.42));
      }
    }
    socialSteer(){
      const mode = this.socialMode || 'solitary';
      const sociality = this.sociality || 0;
      if(mode==='solitary' || sociality<0.32) return 0;
      const range = mode==='defense-school' ? clamp(this.senseR*(0.54 + sociality*0.52), 54, 152) : clamp(this.senseR*(0.38 + sociality*0.44), 38, 112);
      let wx=0, wy=0, wvx=0, wvy=0, wsum=0, count=0;
      let fleeX=0, fleeY=0, fleeW=0, predators=0;
      forEachOrgNeighbors(this.x,this.y,range,(o,dx,dy,d2)=>{
        if(o===this || o.dead) return;
        const d=Math.sqrt(d2)||1;
        const predatorThreat = mode==='defense-school' && o.genes && o.genes.carnivory>0.62 && o.size>=this.size*0.62;
        if(predatorThreat){
          const w = clamp(1 - d/range, 0.08, 1) * (0.85 + o.genes.carnivory*0.45);
          fleeX += (-dx/d)*w;
          fleeY += (-dy/d)*w;
          fleeW += w;
          predators++;
        }
        if(!canUseGroupStrategy(o.genes)) return;
        const sameSpecies = o.speciesKey===this.speciesKey;
        if(!sameSpecies) return;
        const affinity = mode==='defense-school' ? 1.12 : 1.0;
        if(affinity<0.08) return;
        const w = affinity * clamp(1 - d/range, 0.04, 1);
        wx += o.x*w; wy += o.y*w; wvx += o.vx*w; wvy += o.vy*w; wsum += w; count++;
      });

          const flee = (0.13 + 0.28*sociality) * (1 + Math.min(2,predators)*0.22);
          this.vx += (fleeX/fleeW)*flee;
          this.vy += (fleeY/fleeW)*flee;
          this.fleeTimer = Math.max(this.fleeTimer, 24 + Math.min(34, predators*8));

          return predators;
        }
        this.socialCount = 0;
        this.herdThreat = Math.max(0,(this.herdThreat||0)-1);
        return 0;
      }
      const cx=wx/wsum, cy=wy/wsum, avx=wvx/wsum, avy=wvy/wsum;
      const dx=cx-this.x, dy=cy-this.y;
      const d=Math.hypot(dx,dy)||1;
      const targetDist = (this.personalSpaceR||this.size) * (mode==='defense-school' ? (predators ? 1.30 : 1.55) : (mode==='cluster' ? 1.75 : (mode==='trail' ? 2.30 : 2.05)));
      let cohesion = 0;
      if(d>targetDist) cohesion = clamp((d-targetDist)/range,0,1);
      if(mode==='defense-school' && predators) cohesion = Math.max(cohesion,0.42);
      if(mode==='trail') cohesion *= 1.25;
      if(mode==='cluster') cohesion *= 0.85;

        this.vy += (fleeY/fleeW)*flee;
        this.fleeTimer = Math.max(this.fleeTimer, 22 + Math.min(34, predators*8));

        this.vy *= 0.992;
      }
      this.socialCount = count;
      this.herdThreat = predators ? Math.max(this.herdThreat||0, 35 + predators*8) : Math.max(0,(this.herdThreat||0)-1);

    }

    step(){

        let best=null, bd2=1e12;

          const c=calls[i];

          const dx=c.x-this.x, dy=c.y-this.y; const d2=dx*dx+dy*dy;

        }
      }
      if(nearest){ const d=Math.sqrt(minD2)||1; const steer = (nearest instanceof Corpse)? 0.16 : 0.18; this.vx += (nearest.x-this.x)/d * steer; this.vy += (nearest.y-this.y)/d * steer; if(this.role==='ambusher' && d < this.senseR*0.5){ this.burstTimer=Math.max(this.burstTimer,22); } 
      // mild avoidance steering for foul areas
      { const ang=Math.atan2(this.vy,this.vx)||0; const d=14;
        const f=(ax,ay)=> (window.env?window.env.valueAt('foul',ax,ay):0);

      if(this.trail.length>1){
        ctx.beginPath();
        for(let i=0;i<this.trail.length;i++){ const p=this.trail[i]; if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); }
        ctx.strokeStyle='rgba(150,190,255,0.10)';
        ctx.lineWidth=1.6;
        ctx.stroke();
      }
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.rotate(Number.isFinite(this.heading) ? this.heading : 0);

      if(ui.showSense){
        ctx.beginPath(); ctx.arc(0,0,this.senseR,0,TAU);
        ctx.strokeStyle='rgba(100,180,255,0.08)';
        ctx.lineWidth=1;
        ctx.stroke();
      }
      if(this.newSpeciesFlash>0){
        const k=clamp(this.newSpeciesFlash/140,0,1);
        const hue=(this._symbol?.outlineHue ?? this.hue ?? 190);
        const rr=this.size*(1.85 + 0.95*(1-k));
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const halo=ctx.createRadialGradient(0,0,1,0,0,rr*1.35);
        halo.addColorStop(0,`hsla(${hue},96%,78%,${0.14*k})`);
        halo.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(0,0,rr*1.35,0,TAU); ctx.fill();
        ctx.strokeStyle=`hsla(${hue},96%,86%,${0.38*k})`;
        ctx.lineWidth=1.0+2.0*k;
        ctx.beginPath(); ctx.arc(0,0,rr,0,TAU); ctx.stroke();
        ctx.strokeStyle=`hsla(${(hue+70)%360},96%,88%,${0.22*k})`;
        ctx.lineWidth=0.8;
        for(let i=0;i<7;i++){
          const a=i*TAU/7 + (this.gait||0)*0.22;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*rr*0.72,Math.sin(a)*rr*0.72);
          ctx.lineTo(Math.cos(a)*rr*1.12,Math.sin(a)*rr*1.12);
          ctx.stroke();
        }
        ctx.restore();
      }

      const roleHue = ROLE_HUE[this.role] ?? sym.outlineHue;
      const outlineHue = ui.roleViz ? roleHue : sym.outlineHue;
      const energy = clamp(this.energy/160,0,1);
      const motion = clamp(this.motionLevel||0,0,1.65);
      const behavior = clamp(
        motion + (this.fleeTimer>0?0.35:0) + ((this.role==='ambusher' && this.burstTimer>0)?0.30:0) + (this.mateSeekT>120?0.10:0),
        0, 1.9
      );
      const intent = clamp(0.18 + behavior, 0.16, 1.9);
      const gait = this.gait || this.phase || 0;
      const pulse = 0.985 + 0.022*Math.sin(gait*0.65 + sym.pulse);
      const posed = [];
      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        if(n.parent==null || n.parent<0 || !nodes[n.parent] || !posed[n.parent]){
          posed[i]={
            x:n.x,
            y:n.y + (nodes.length===1 ? Math.sin(gait*0.85 + sym.pulse)*this.size*0.045*intent : Math.sin(gait*0.45 + sym.pulse)*this.size*0.018*intent),
            angle:0,
            bend:0
          };
          continue;
        }
        const restParent=nodes[n.parent];
        const parentPose=posed[n.parent];
        const dx=n.x-restParent.x, dy=n.y-restParent.y;
        const len=Math.hypot(dx,dy)||1;
        const baseA=Math.atan2(dy,dx);
        const branchMul=n.kind==='ring'?0.34:(n.kind==='branch'||n.kind==='tip'?0.72:1.0);
        const wave1=Math.sin(gait*1.15 + sym.wigglePhase + i*0.95 + (n.kind==='branch'?0.7:0));
        const wave2=Math.sin(gait*0.52 + sym.wigglePhase*1.7 + i*0.41);
        const joint=(wave1*0.78 + wave2*0.22) * sym.wiggleAmp * intent * branchMul;
        const inherited=(parentPose.bend||0)*0.76;
        const a=baseA + joint + inherited;
        posed[i]={
          x:parentPose.x + Math.cos(a)*len,
          y:parentPose.y + Math.sin(a)*len,
          angle:a,
          bend:joint + inherited*0.45
        };
      }

      // Soft aura for readable overlap.
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const auraR = this.size*(1.4 + 0.35*nodes.length);
      const aura=ctx.createRadialGradient(0,0,1,0,0,auraR);
      aura.addColorStop(0,`hsla(${outlineHue},82%,72%,${dayNight.isNight?0.12:0.11})`);
      aura.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=aura;
      ctx.beginPath(); ctx.arc(0,0,auraR,0,TAU); ctx.fill();
      ctx.restore();

      // Smooth connective tissue between joints.
      ctx.save();
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.globalCompositeOperation='source-over';
      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        if(n.parent==null || n.parent<0 || !nodes[n.parent]) continue;
        const p=posed[n.parent], q=posed[i];
        if(!p || !q) continue;
        const mx=(p.x+q.x)*0.5, my=(p.y+q.y)*0.5;
        const dx=q.x-p.x, dy=q.y-p.y;
        const d=Math.hypot(dx,dy)||1;
        const bend=(posed[i].bend||0);
        const cx=mx + (-dy/d)*bend*this.size*0.66;
        const cy=my + ( dx/d)*bend*this.size*0.66;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.quadraticCurveTo(cx,cy,q.x,q.y);
        const linkAlpha=clamp(sym.lineAlpha*(dayNight.isNight?0.54:0.76)*(0.75+0.25*energy),0.08,0.38);
        ctx.strokeStyle=`hsla(${outlineHue},82%,78%,${linkAlpha})`;
        ctx.lineWidth=Math.max(1.0, Math.min(nodes[n.parent].r,n.r)*0.30);
        ctx.stroke();
      }
      for(const link of (sym.extraLinks||[])){
        const p=posed[link.a], q=posed[link.b];
        if(!p || !q || !nodes[link.a] || !nodes[link.b]) continue;
        const mx=(p.x+q.x)*0.5, my=(p.y+q.y)*0.5;
        const dx=q.x-p.x, dy=q.y-p.y;
        const d=Math.hypot(dx,dy)||1;
        const bend=Math.sin(gait*0.82 + sym.wigglePhase + link.a*0.37)*sym.wiggleAmp*intent*0.22;
        const cx=mx + (-dy/d)*bend*this.size*0.38;
        const cy=my + ( dx/d)*bend*this.size*0.38;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.quadraticCurveTo(cx,cy,q.x,q.y);
        const linkAlpha=clamp(sym.lineAlpha*(dayNight.isNight?0.58:0.82)*(0.78+0.22*energy),0.10,0.42);
        ctx.strokeStyle=`hsla(${outlineHue},84%,80%,${linkAlpha})`;
        ctx.lineWidth=Math.max(1.0, Math.min(nodes[link.a].r,nodes[link.b].r)*0.30);
        ctx.stroke();
      }
      ctx.restore();

      // Articulation joints.
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        if(n.parent==null || n.parent<0 || !posed[n.parent] || !posed[i]) continue;
        const p=posed[n.parent], q=posed[i];
        const jx=(p.x+q.x)*0.5, jy=(p.y+q.y)*0.5;
        const jr=Math.max(0.85, Math.min(nodes[n.parent].r,n.r)*0.18);
        ctx.beginPath();
        ctx.arc(jx,jy,jr,0,TAU);
        ctx.fillStyle=`hsla(${outlineHue},92%,84%,${0.20+0.16*energy+0.08*motion})`;
        ctx.fill();
        ctx.strokeStyle=`rgba(255,255,255,${0.22+0.16*energy+0.06*motion})`;
        ctx.lineWidth=0.7;
        ctx.stroke();
      }
      for(const link of (sym.extraLinks||[])){
        const p=posed[link.a], q=posed[link.b];
        if(!p || !q || !nodes[link.a] || !nodes[link.b]) continue;
        const jx=(p.x+q.x)*0.5, jy=(p.y+q.y)*0.5;
        const jr=Math.max(0.85, Math.min(nodes[link.a].r,nodes[link.b].r)*0.18);
        ctx.beginPath();
        ctx.arc(jx,jy,jr,0,TAU);
        ctx.fillStyle=`hsla(${outlineHue},94%,86%,${0.18+0.16*energy+0.06*motion})`;
        ctx.fill();
        ctx.strokeStyle=`rgba(255,255,255,${0.20+0.16*energy+0.05*motion})`;
        ctx.lineWidth=0.7;
        ctx.stroke();
      }
      ctx.restore();

      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        const pn=posed[i] || n;
        const shape = sym.shapeNames[n.shape] || 'circle';
        const hue = ui.roleViz ? roleHue : n.hue;
        const r = n.r * pulse;
        const alpha = clamp(n.alpha*sym.transparency, 0.20, 0.84);
        ctx.save();
        ctx.translate(pn.x,pn.y);
        ctx.rotate(sym.shapeRot || 0);

        const grad=ctx.createRadialGradient(-r*0.35,-r*0.38,Math.max(0.8,r*0.08),0,0,r*1.35);
        grad.addColorStop(0,`hsla(${(hue+sym.gradientShift*0.28)%360},92%,78%,${alpha+0.06})`);
        grad.addColorStop(0.62,`hsla(${hue},78%,58%,${alpha})`);
        grad.addColorStop(1,`hsla(${(hue+24)%360},72%,48%,${alpha*0.82})`);
        ctx.fillStyle=grad;
        this.symbolShapePath(ctx, shape, r);
        ctx.fill();

        ctx.strokeStyle=dayNight.isNight ? `hsla(${hue},92%,88%,${0.30 + 0.26*energy})` : 'rgba(4,18,30,0.24)';
        ctx.lineWidth=Math.max(1.1,r*0.16);
        this.symbolShapePath(ctx, shape, r);
        ctx.stroke();

        ctx.strokeStyle=`hsla(${hue},96%,${dayNight.isNight?88:92}%,${clamp(0.38 + 0.30*energy + (dayNight.isNight?0:0.12),0,0.82)})`;
        ctx.lineWidth=Math.max(0.75,r*0.09);
        this.symbolShapePath(ctx, shape, r);
        ctx.stroke();

        // Round nucleus: centered and kept inside every shape.
        const shapeLimit = (shape==='triangle'||shape==='leaf'||shape==='sparkle4'||shape==='star6') ? 0.20 : (shape==='diamond' ? 0.23 : (shape==='ellipse' ? 0.25 : 0.29));
        const nucR=Math.max(0.9, Math.min(r*shapeLimit, r*sym.coreScale));
        const nucX=0, nucY=0;
        const ng=ctx.createRadialGradient(nucX-nucR*0.25,nucY-nucR*0.25,0.2,nucX,nucY,nucR*1.45);
        ng.addColorStop(0,`hsla(${sym.nucleusHue},90%,88%,${0.72 + 0.18*energy})`);
        ng.addColorStop(0.55,`hsla(${sym.nucleusHue},75%,52%,${0.48 + 0.22*energy})`);
        ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng;
        ctx.beginPath();
        ctx.arc(nucX,nucY,nucR*1.45,0,TAU);
        ctx.fill();
        ctx.strokeStyle=`rgba(255,255,255,${0.26 + 0.22*energy})`;
        ctx.lineWidth=Math.max(0.55,nucR*0.16);
        ctx.beginPath(); ctx.arc(nucX,nucY,nucR,0,TAU); ctx.stroke();

        // Tiny marker rings make variants distinct without becoming noisy.
        if((i + sym.primaryIndex) % 3 === 0){
          ctx.strokeStyle=`hsla(${(hue+120)%360},90%,82%,${0.18 + 0.12*energy})`;
          ctx.lineWidth=0.6;
          ctx.beginPath(); ctx.arc(-r*0.30,r*0.24,Math.max(0.7,r*0.16),0,TAU); ctx.stroke();
        }
        ctx.restore();
      }

      if(this.protect>0){
        ctx.beginPath();
        ctx.arc(0,0,this.size*(1.35 + Math.min(4,nodes.length)*0.18),0,TAU);
        ctx.strokeStyle='rgba(255,255,255,0.16)';
        ctx.lineWidth=1;
        ctx.stroke();
      }
      ctx.restore();
    }

    draw(){
      return this.drawSymbolic();
      if(this.trail.length>1){ ctx.beginPath(); for(let i=0;i<this.trail.length;i++){ const p=this.trail[i]; if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);} ctx.strokeStyle='rgba(120,160,255,0.12)'; ctx.lineWidth=2; ctx.stroke(); }
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(Math.atan2(this.vy,this.vx));
      if(this.flags && this.flags.glow){
        const glowK = dayNight.isNight ? 1.0 : 0.28;
        const pulse = 0.65 + 0.35*Math.sin(frame*0.08 + this.id*0.9);
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const r = Math.max(10, this.size*(dayNight.isNight ? 2.3 : 1.4));
        const hueG = (ui.roleViz ? (ROLE_HUE[this.role] ?? (this.hue||180)) : (this.hue||180));

        const grad = ctx.createRadialGradient(0,0,1, 0,0,r);
        grad.addColorStop(0, `hsla(${hueG},90%,76%,${(0.85*glowK*pulse).toFixed(3)})`);
        grad.addColorStop(0.45, `hsla(${hueG},85%,65%,${(0.22*glowK*pulse).toFixed(3)})`);
        grad.addColorStop(1, `rgba(0,0,0,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill();

        // thin ring for readability
        ctx.beginPath(); ctx.arc(0,0,Math.max(7, this.size*1.05),0,TAU);
        ctx.strokeStyle = `hsla(${hueG},95%,78%,${(0.55*glowK*pulse).toFixed(3)})`;
        ctx.lineWidth = 1.6;
        ctx.stroke();

        // small spark rays at night only
        if(dayNight.isNight){
          ctx.strokeStyle = `hsla(${hueG},95%,80%,${(0.25*pulse).toFixed(3)})`;
          ctx.lineWidth = 1.1;
          const rays = 5 + (this.lobeCount?1:0);
          for(let i=0;i<rays;i++){
            const a = (i/rays)*TAU + this.phase*0.35;
            const L = this.size*(1.2 + 0.9*pulse);
            ctx.beginPath();
            ctx.moveTo(Math.cos(a)*this.size*0.55, Math.sin(a)*this.size*0.55);
            ctx.lineTo(Math.cos(a)*L, Math.sin(a)*L);
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      if(ui.showSense){ ctx.beginPath(); ctx.arc(0,0,this.senseR,0,TAU); ctx.strokeStyle='rgba(100,180,255,0.08)'; ctx.lineWidth=1; ctx.stroke(); }
      const micro = this._micro || (this.prepareMicroDetails(), this._micro);
      const bodyRX = this.size*this.aspect;
      const bodyRY = this.size;

      // Motile appendages: flagella and cilia sit behind the translucent body.
      if(micro && micro.flagellaN){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle=`hsla(${this.hue||180}, 90%, 82%, ${dayNight.isNight?0.42:0.24})`;
        ctx.lineWidth=Math.max(0.65, this.size*0.10);
        for(let j=0;j<micro.flagellaN;j++){
          const off=(j-(micro.flagellaN-1)/2)*0.22;
          const baseA=Math.PI + off;
          const bx=Math.cos(baseA)*bodyRX*0.88;
          const by=Math.sin(baseA)*bodyRY*0.88;
          const len=micro.flagellaLen*(0.82+0.18*Math.sin(frame*0.035+j));
          ctx.beginPath();
          ctx.moveTo(bx,by);
          for(let k=1;k<=7;k++){
            const q=k/7;
            const wag=Math.sin(frame*0.075 + q*4.5 + j)*this.size*0.34;
            const x=bx - len*q;
            const y=by + wag*Math.sin(q*Math.PI);
            if(k===1) ctx.lineTo(x,y); else ctx.lineTo(x,y);
          }
          ctx.stroke();
        }
        ctx.restore();
      }
      if(micro && micro.ciliaCount>0){
        const n=Math.min(44,micro.ciliaCount);
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle=`hsla(${(this.hue+35)%360}, 86%, 84%, ${dayNight.isNight?0.34:0.18})`;
        ctx.lineWidth=0.75;
        for(let i=0;i<n;i++){
          const a=(i/n)*TAU + micro.membranePhase;
          const pulse=0.75+0.25*Math.sin(frame*0.06+i*0.9);
          const sx=Math.cos(a)*bodyRX*0.98;
          const sy=Math.sin(a)*bodyRY*0.98;
          const ex=Math.cos(a)*(bodyRX + micro.ciliaLen*pulse*0.34);
          const ey=Math.sin(a)*(bodyRY + micro.ciliaLen*pulse*0.34);
          ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
        }
        ctx.restore();
      }
      
      // === Sea-Glass Rendering ===
      // Build a gene-driven microbial membrane.
      ctx.beginPath();
      const segs = 80;
      for(let i=0;i<=segs;i++){
        const t=i/segs*TAU;
        let wave= this.lobeCount>0 ? Math.sin(this.lobeCount*t + this.phase)*this.lobeAmp : 0;
        let membrane = micro ? Math.sin((micro.membraneFreq||5)*t + micro.membranePhase + frame*0.006)*(micro.membraneRipple||0.04) : 0;
        let rx=this.size*this.aspect, ry=this.size;
        let r=1 + wave + membrane;
        if(this.family===1){ r*=1 + 0.18*Math.cos(t-0.45); ry*=0.74; }
        else if(this.family===2){ r*=1 + 0.05*Math.sin(this.segCount*t + frame*0.01); ry*=0.58; rx*=1.12; }
        else if(this.family===3){ r*=1 + 0.06*Math.sin(8*t + this.phase); ry*=0.92 + 0.08*Math.cos(t); }
        else if(this.family===4){ r*=1 + 0.28*Math.sin(this.petalN*0.5*t + this.phase); }
        else if(this.family===5){ r*=1 + 0.05*Math.sin(6*t); ry*=0.42; rx*=1.25; }
        else if(this.family===6){ r*=1 + 0.12*Math.sin(3*t + this.phase); ry*=0.34; rx*=1.55; }
        else if(this.family===7){ r*=0.95 + 0.10*Math.sign(Math.sin(this.facetN*t + 0.3)); }
        else if(this.family===8){ r*=1 + 0.05*Math.sin(14*t + this.phase); ry*=0.82; rx*=0.98; }
        else if(this.family===9){ r*=1 + 0.08*Math.sin(5*t + this.phase) + 0.05*Math.sin(11*t); }
        r=Math.max(0.48,r);
        const x=Math.cos(t)*rx*r, y=Math.sin(t)*ry*r;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();

      // Gene-mapped optical properties
      const ageF = Math.min(1, this.age/9000);
      const frost = Math.max(0, Math.min(0.65, 0.15 + 0.35*ageF*(0.5 + 0.5*(1 - this.genes.efficiency)) ));
      const clarity = Math.max(0.25, Math.min(0.95, 0.78 - frost + 0.05*(1 - this.genes.size) + 0.08*(this.energy/160) ));
      const rimK = 0.22 + 0.25*(1 - frost);
      const specK = 0.18 + 0.20*(1 - frost);

      // Base tone (muted, sea-glass palette)
      const hue0 = this.hue || 180;
      const sat0 = (this.sat!=null) ? this.sat : 55;
      const hue = ui.roleViz ? (ROLE_HUE[this.role] ?? hue0) : hue0;
      const sat = ui.roleViz ? 72 : sat0;
      const c1 = `hsla(${hue}, ${sat}%, 70%, ${0.65*clarity})`;
      const c2 = `hsla(${hue}, ${sat}%, 40%, ${0.85*clarity})`;

      // Light direction drifts slowly
      const lightA = (frame*0.002) % TAU;
      const hlx = Math.cos(lightA), hly = Math.sin(lightA);

      // BASE: soft radial gradient (transmitted color)
      const rg = ctx.createRadialGradient(-this.size*0.25, -this.size*0.25, Math.max(1,this.size*0.2), 0, 0, this.size*1.2);
      rg.addColorStop(0, c1);
      rg.addColorStop(1, c2);
      ctx.fillStyle = rg;
      ctx.globalAlpha = 1.0;
      ctx.fill();

      // Clip to organism silhouette to avoid rectangular overlays
      ctx.save();
      ctx.clip();

      // FROST (interior haze)
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      const fog = ctx.createRadialGradient(0, 0, 1, 0, 0, this.size*1.05);
      fog.addColorStop(0, `rgba(255,255,255,${0.18*frost})`);
      fog.addColorStop(1, `rgba(255,255,255,0)`);
      ctx.fillStyle = fog;
      ctx.fillRect(-this.size*this.aspect-3, -this.size-3, this.size*2*this.aspect+6, this.size*2+6);
      ctx.restore(); /*__RESTORED_FROST__*/

      // INNER AO (bottom darkening)
      const ao = ctx.createRadialGradient(0, this.size*0.35, 1, 0, this.size*0.35, this.size*1.1);
      ao.addColorStop(0, `rgba(0,0,0,0.06)`);
      ao.addColorStop(1, `rgba(0,0,0,0.22)`);
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = ao;
      ctx.fillRect(-this.size*this.aspect-3, -this.size-3, this.size*2*this.aspect+6, this.size*2+6);
      ctx.globalAlpha = 1.0;

      // SUBTLE STRIATIONS / cytoplasm flow
      if(micro){
        ctx.save();
        ctx.globalCompositeOperation='source-atop';
        ctx.strokeStyle=`hsla(${(hue+25)%360}, 92%, 82%, ${dayNight.isNight?0.13:0.09})`;
        ctx.lineWidth=0.7;
        const bands=Math.max(3, micro.striation||5);
        for(let i=0;i<bands;i++){
          const y=-this.size*0.72 + (i/(bands-1))*this.size*1.44;
          ctx.beginPath();
          ctx.moveTo(-this.size*this.aspect*0.78,y);
          ctx.quadraticCurveTo(0,y + Math.sin(frame*0.01+i)*this.size*0.18, this.size*this.aspect*0.78,y+Math.cos(i)*this.size*0.08);
          ctx.stroke();
        }
        ctx.restore();
      }

      // NUCLEUS / vacuole
      if(micro && micro.nucleus){
        const n=micro.nucleus;
        ctx.save();
        ctx.globalCompositeOperation='source-atop';
        const ng=ctx.createRadialGradient(n.x-this.size*0.08,n.y-this.size*0.10,0.5,n.x,n.y,n.r*1.45);
        ng.addColorStop(0,`hsla(${n.hue},92%,86%,${dayNight.isNight?0.42:0.34})`);
        ng.addColorStop(0.55,`hsla(${n.hue},70%,58%,${dayNight.isNight?0.26:0.18})`);
        ng.addColorStop(1,'rgba(0,0,0,0)');

    const shapes=['circle','square','triangle','ellipse','pentagon','hexagon','leaf','diamond','sparkle4','star6','cloud5'];
    const shape=shapes[Math.max(0,Math.min(shapes.length-1,Math.floor(clamp(g.morph??g.elongation??g.speed??0.5,0,0.999)*shapes.length)))];
    const solitary=((g.size??0.5)*0.48 + (1-(g.elongation??0.5))*0.35 + hash01('avsingle:'+key)*0.22)>0.58;

    const baseR=(5.5 + (g.size??0.5)*1.7).toFixed(1);

    function nodeShape(cx,cy,r,rot){

      if(shape==='leaf'){
        const pts=[
          `${cx},${(cy-r*1.42).toFixed(1)}`,
          `${(cx+r*0.60).toFixed(1)},${cy}`,
          `${cx},${(cy+r*1.42).toFixed(1)}`,

        return `<polygon points="${pts.join(' ')}" transform="rotate(${rot} ${cx} ${cy})"/>`;
      }
      if(shape==='diamond'){
        const pts=[`${cx},${(cy-r).toFixed(1)}`,`${(cx+r*1.30).toFixed(1)},${(cy-r*.12).toFixed(1)}`,`${cx},${(cy+r).toFixed(1)}`,`${(cx-r*1.30).toFixed(1)},${(cy+r*.12).toFixed(1)}`];
        return `<polygon points="${pts.join(' ')}" transform="rotate(${rot} ${cx} ${cy})"/>`;

      }
      if(shape==='star6' || shape==='cloud5'){

      const pts=[];
      for(let i=0;i<sides;i++){ const a=-Math.PI/2 + rot*Math.PI/180 + i/sides*TAU; pts.push(`${(cx+Math.cos(a)*r).toFixed(1)},${(cy+Math.sin(a)*r).toFixed(1)}`); }
      return `<polygon points="${pts.join(' ')}"/>`;
    }
    const parts=[];
    const links=[];
    for(let i=0;i<chain;i++){
      const x=12+i*(24/(chain-1||1));

      if(i>0){ const px=12+(i-1)*(24/(chain-1||1)); const py=24 + Math.sin((i-1)*1.3+hash01(key))*3.2; links.push(`<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`); }
      const nucR=(Number(baseR)*((shape==='triangle'||shape==='leaf'||shape==='sparkle4'||shape==='star6')?0.20:(shape==='diamond'?0.23:0.26))).toFixed(1);
      parts.push(`<g fill="url(#grad-${key})" stroke="${stroke}" stroke-opacity=".55" stroke-width=".9">${nodeShape(x.toFixed(1),y.toFixed(1),baseR,iconRot)}</g><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${nucR}" fill="hsl(${(hue+155)%360} 80% 75% / .82)" stroke="rgba(255,255,255,.45)" stroke-width=".5"/>`);
    }

      const nucR=(Number(baseR)*((shape==='triangle'||shape==='leaf'||shape==='sparkle4'||shape==='star6')?0.20:(shape==='diamond'?0.23:0.26))).toFixed(1);

  }

  function drawPhy(){
    try {
      const cvs = $('phylo-canvas');
      if(!cvs) return;
      const c = cvs.getContext('2d', { willReadFrequently: true });
      const w = cvs.width, h = cvs.height;
      c.clearRect(0,0,w,h);
      c.fillStyle='rgba(12,16,28,0.25)';
      c.fillRect(0,0,w,h);
      c.font='11px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif';
      c.fillStyle='#9fb3d1';
      c.fillText('MST（類似分布）', 8, 14);

      // 現在の種ごとの平均
      const sums=new Map();
      for(const o of organisms){
        const k=o.speciesKey; let s=sums.get(k);
        if(!s){ s={n:0, g:{speed:0,size:0,eff:0,repro:0,sens:0,carn:0}}; sums.set(k,s); }
        s.n++; s.g.speed+=o.genes.speed; s.g.size+=o.genes.size; s.g.eff+=o.genes.efficiency; s.g.repro+=o.genes.reproduction; s.g.sens+=o.genes.sensory; s.g.carn+=o.genes.carnivory;
      }
      const nodes=[];
      sums.forEach((s,k)=>{
        const n=s.n; if(n<=0) return;
        const g={speed:s.g.speed/n,size:s.g.size/n,eff:s.g.eff/n,reproduction:s.g.repro/n,sensory:s.g.sens/n,carnivory:s.g.carn/n};
        const hue = Math.floor(speciesPalette(k).hue);
        const ln = lineage.nodes.get(k) || {firstSeen:frame,lastSeen:frame,count:n};
        nodes.push({key:k,n,g,hue, first:ln.firstSeen, last:ln.lastSeen});
      });
      nodes.sort((a,b)=>b.n-a.n);
      const top=nodes.slice(0,40);

      const pad=14, ww=w-pad*2, hh=h-pad*2-8;

      if(phyMode==='mst'){
        const edges=[];
        if(top.length>=2){
          const vis=new Set([0]);
          while(vis.size<top.length){
            let bestI=-1,bestJ=-1,bestD=1e9;
            for(const i of vis){
              for(let j=0;j<top.length;j++){
                if(vis.has(j)) continue;
                const a=top[i].g, b=top[j].g;
                const d=(a.speed-b.speed)**2+(a.size-b.size)**2+(a.eff-b.eff)**2+(a.reproduction-b.reproduction)**2+(a.sensory-b.sensory)**2+(a.carnivory-b.carnivory)**2;
                if(d<bestD){ bestD=d; bestI=i; bestJ=j; }
              }
            }
            edges.push({i:bestI,j:bestJ});
            vis.add(bestJ);
          }
        }
        const proj=(g)=>({X: g.carnivory*ww, Y: (1-g.speed)*hh});
        c.save();
        c.translate(pad,pad+6);
        c.strokeStyle='rgba(200,220,255,0.25)'; c.lineWidth=1;
        for(const e of edges){ const a=top[e.i], b=top[e.j]; if(!a||!b) continue; const pa=proj(a.g), pb=proj(b.g); c.beginPath(); c.moveTo(pa.X,pa.Y); c.lineTo(pb.X,pb.Y); c.stroke(); }
        for(const n of top){ const p=proj(n.g); const r=Math.max(2, Math.log2(2+n.n)); c.beginPath(); c.arc(p.X,p.Y,r,0,Math.PI*2); c.fillStyle=`hsl(${n.hue} 70% 55% / 0.85)`; c.fill(); c.strokeStyle='rgba(255,255,255,0.22)'; c.stroke(); }
        c.restore();
      } else {
        // lineage: x = firstSeen timeline, y = hashed lane or current carnivory
        const minT = Math.min(...nodes.map(n=>n.first));
        const maxT = frame + 1;
        const projT = (t)=> (t-minT)/(maxT-minT+1);
        const pos = new Map();
        c.save();
        c.translate(pad,pad+6);
        // edges
        c.strokeStyle='rgba(200,220,255,0.22)'; c.lineWidth=1;
        for(const e of lineage.edges.slice(-200)){ // last 200 edges
          const a = nodes.find(n=>n.key===e.from);
          const b = nodes.find(n=>n.key===e.to);
          if(!a || !b) continue;
          const x1 = projT(a.first)*ww;
          const x2 = projT(b.first)*ww;
          const y1 = (0.1 + 0.8*hash01(a.key))*hh;
          const y2 = (0.1 + 0.8*hash01(b.key))*hh;
          c.beginPath();
          c.moveTo(x1,y1);
          c.lineTo(x2,y2);
          c.stroke();
        }
        // nodes
        for(const n of nodes){
          const x = projT(n.first)*ww;
          const y = (0.1 + 0.8*hash01(n.key))*hh;
          pos.set(n.key,{x,y});
          const r = Math.max(2, Math.log2(2+n.n));
          c.beginPath(); c.arc(x,y,r,0,TAU);
          c.fillStyle=`hsl(${n.hue} 70% 55% / 0.85)`; c.fill();
          c.strokeStyle='rgba(255,255,255,0.22)'; c.stroke();
        }
        c.restore();
      }
    } catch(e){ /* ignore */ }
  }

  }
}

      for(const q of pts){
        food.push(new Food(clamp(q.x,8,W-8), clamp(q.y,8,H-8), 'detritus'));
        if(window.env.sinkDetritusAt) window.env.sinkDetritusAt(q.x,q.y,0.018);
      }
    }
  }
}
      // 死亡掃除
      for(let i=organisms.length-1;i>=0;--i){ if(organisms[i].dead){ const k=organisms[i].speciesKey; speciesCount.set(k, Math.max(0, (speciesCount.get(k)||1)-1)); organisms.splice(i,1); } }
      // 新生児反映
      if(newborn.length){ organisms.push(...newborn); newborn.length=0; }
      // 人口制限
      if(ui.popMax>0 && organisms.length>ui.popMax){ organisms.sort((a,b)=>b.fitness - a.fitness); organisms.length=ui.popMax; log(`⚖ 個体数を上限${ui.popMax}に調整`); }
      // 餌の自然供給
      if(frame%20===0){ const f=season(); const pop=organisms.length; const baseSmall=Math.max(1,Math.round(2*f)); const baseBig=Math.random()<0.15?1:0; const extra=Math.round(pop*0.15*f); addFood(baseSmall+extra, baseBig); const label = f<0.9 ? '🍂 飢饉期' : '🌱 豊作期'; if(label !== lastSeasonLabel){ showToast('season', label); lastSeasonLabel = label; } }
      if(frame%60===0) updateRoleShare();
      if(frame%800===0 && organisms.length){ generation++; $('generation').textContent=String(generation); reportMix(); }
      tickEvent(); maybeTriggerEvent(); if((frame%10)===0) ecoTick();
      if(organisms.length===0){ log('💀 絶滅 → 再播種'); initPopulation(18); }
      peaceCounter++; evaluateChallenges();
      tickDayNight();
      if(frame%210===0) rebuildSpeciesCards();
    }
  }
  function updateRoleShare(){ const n=organisms.length||1; const c={ambusher:0,pack:0,scav:0,filter:0,other:0}; for(const x of organisms){ c[x.role]++; } for(const k of Object.keys(c)){ roleShare[k]=c[k]/n; } }

  function draw(){
    drawBackground();
    // レイヤー順：パッチ -> エフェクト -> 餌/死骸/プランクトン -> 個体 -> スパーク -> HUD -> 右下HUD
    // patches hidden; environment is visualized as dots
    if(window.env) window.env.draw(ctx);
    for(const e of effects){ const k=e.t/e.maxT; ctx.beginPath(); ctx.arc(e.x,e.y,e.r*(0.98+0.02*Math.sin(frame*0.1)),0,TAU); ctx.strokeStyle = e.type==='repel'? `rgba(120,255,160,${0.18*k})` : `rgba(255,230,120,${0.18*k})`; ctx.lineWidth=2; ctx.stroke(); }
    for(const f of food){ f.draw(ctx); }
    for(const c of corpses){ c.draw(ctx); }
    for(const p of plankton){ p.draw(ctx); }
    // same-species mating calls (beacons)
    for (let i=calls.length-1;i>=0;--i){
      const c=calls[i]; c.t--;
      if(c.t<=0){ calls.splice(i,1); continue; }
      const k=c.t/c.maxT;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r*(1.0-0.35*(1-k)),0,TAU);
      ctx.strokeStyle = 'rgba(140,200,255,'+(0.10*k)+')';
      ctx.lineWidth=1.5;
      ctx.stroke();
    }
    for(const o of organisms){ o.draw(); }
    for(let i=sparks.length-1;i>=0;--i){ const s=sparks[i]; s.step(); s.draw(ctx); if(s.t<=0) sparks.splice(i,1); }
    drawHUD();
    drawPhy();
  }

  window.__alifeDebug = {
    counts(){
      return { organisms:organisms.length, sparks:sparks.length, corpses:corpses.length, species:new Set(organisms.map(o=>o.speciesKey)).size };
    },
    speciesColorSummary(){
      const bySpecies=new Map();
      for(const o of organisms){
        const key=o.speciesKey || speciesKey(o.genes);
        let rec=bySpecies.get(key);
        if(!rec){ rec={key,n:0,hues:new Set(),colors:new Set()}; bySpecies.set(key,rec); }
        rec.n++;
        rec.hues.add(Math.round((o.hue||0)*100)/100);
        rec.colors.add(o.baseColor||'');
      }
      const mismatched=[];
      for(const rec of bySpecies.values()){
        if(rec.hues.size>1 || rec.colors.size>1) mismatched.push({key:rec.key,n:rec.n,hues:[...rec.hues],colors:[...rec.colors]});
      }
      return { species:bySpecies.size, mismatched };
    },
    previewPredationEffect(){
      const prey=organisms[0];
      if(!prey) return false;
      spawnPredationScatter(prey, organisms[1]||null, 1.2);
      return true;
    },
    previewNewSpeciesEffect(){
      const org=organisms[0];
      if(!org) return false;
      markNewSpecies(org);
      return true;
    }
  };

  function loop(){ if(running){ update(); if(frame%20===0) reportMix(); } draw(); requestAnimationFrame(loop); }

  function seedPatches(){ patches.push(new Patch('algae', W*0.30, H*0.32, Math.min(W,H)*0.20)); patches.push(new Patch('turbid', W*0.55, H*0.75, Math.min(W,H)*0.18)); }
  function seedPlankton(){ for(let i=0;i<160;i++) plankton.push(new Plankton()); }

  // ===== Save / Load =====
  function capture(){
    const state={v:4,frame,generation,dayNight:{phase:dayNight.phase},worldEvent,eco,
      food: food.map(f=>({x:f.x,y:f.y,type:f.type})),
      corpses: corpses.map(c=>({x:c.x,y:c.y,energy:c.energy,t:c.t})),
      patches: patches.map(p=>({type:p.type,x:p.x,y:p.y,r:p.r})),
      plankton: plankton.map(p=>({x:p.x,y:p.y,vx:p.vx,vy:p.vy,t:p.t})),
      organisms: organisms.map(o=>({x:o.x,y:o.y,vx:o.vx,vy:o.vy,energy:o.energy,age:o.age,genes:o.genes,speciesKey:o.speciesKey,traits:o.traits||null,flags:o.flags||null})),
      lineage: { nodes: Array.from(lineage.nodes.entries()), edges: lineage.edges }
    };
    return 'ALIFE2:'+ btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  }
  function restore(s){
    try{
      if(!s.startsWith('ALIFE2:')) throw new Error('ヘッダー不正');
      const body=s.split(':',2)[1]; const state=JSON.parse(decodeURIComponent(escape(atob(body))));
      running=false;
      food.length=0; corpses.length=0; plankton.length=0; patches.length=0; organisms.length=0; sparks.length=0; effects.length=0; speciesCount.clear();
      (state.patches||[]).forEach(p=>patches.push(new Patch(p.type,p.x,p.y,p.r)));
      (state.food||[]).forEach(f=>food.push(new Food(f.x,f.y,f.type)));
      (state.corpses||[]).forEach(c=>corpses.push(new Corpse(c.x,c.y,c.energy)));
      (state.plankton||[]).forEach(p=>{ const q=new Plankton(); q.x=p.x;q.y=p.y;q.vx=p.vx;q.vy=p.vy;q.t=p.t; plankton.push(q); });
      (state.organisms||[]).forEach(o=>{
        const u=new Organism(o.x,o.y,o.genes,false);
        u.vx=o.vx; u.vy=o.vy; u.energy=o.energy; u.age=o.age;
        if(o.traits) u.traits=o.traits;
        // recompute flags to include any new trait logic (backward compatible)
        u.flags = __flagsFromTraits(u.traits||{}, u.genes);
                __ensureChlSpots(u);
organisms.push(u);
      });
      frame=state.frame||0; generation=state.generation||1; if(state.dayNight?.phase!=null) dayNight.phase=state.dayNight.phase; Object.assign(worldEvent, state.worldEvent||{}); Object.assign(eco, state.eco||{});
      // lineage
      lineage.nodes.clear(); lineage.edges.length=0;
      if(state.lineage){ for(const [k,v] of (state.lineage.nodes||[])){ lineage.nodes.set(k,v); } lineage.edges.push(...(state.lineage.edges||[])); }
      reportMix(); rebuildSpeciesCards();
      showToast('season','✔ ロード完了');
    }catch(e){ alert('ロード失敗: '+(e?.message||e)); }
  }
  function buildCodexBrief(){
    const species = new Set(organisms.map(o=>o.speciesKey));
    const roles = {ambusher:0, pack:0, scav:0, filter:0, other:0};
    let motionSum = 0;
    for(const o of organisms){
      roles[o.role] = (roles[o.role]||0) + 1;
      motionSum += o.motionLevel || 0;
    }
    const topSpecies = Array.from(speciesCount.entries())
      .filter(([,n])=>n>0)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([k,n])=>`${k}:${n}`)
      .join(', ') || 'none';
    return [
      'ALIFE symbolic shapes v1 状態メモ',
      'ファイル: alife_symbolic_shapes_v1.html',
      `個体数: ${organisms.length}`,
      `現存種数: ${species.size}`,
      `世代: ${generation}`,
      `昼夜: ${dayNight.isNight ? '夜' : '昼'}`,
      `平均運動量: ${organisms.length ? (motionSum/organisms.length).toFixed(2) : '0.00'}`,
      `ロール: ambusher=${roles.ambusher||0}, pack=${roles.pack||0}, scav=${roles.scav||0}, filter=${roles.filter||0}, other=${roles.other||0}`,
      `上位種: ${topSpecies}`,
      '',
      '気になった見た目/動き:',
      ''
    ].join('\n');
  }
  async function copyPlainText(text, okMessage){
    try{
      await navigator.clipboard.writeText(text);
    }catch(e){
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.setAttribute('readonly','');
      ta.style.position='fixed';
      ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.select();
      try{ document.execCommand('copy'); }catch(_){}
      ta.remove();
    }
    showToast('season', okMessage);
  }
  $('copy-brief-btn').addEventListener('click',async()=>{ 
    await copyPlainText(buildCodexBrief(), 'Codex用の状態メモをコピーしました');
  });

  $('save-btn').addEventListener('click',async()=>{ 
    const data=capture(); 
    try{ 
      await navigator.clipboard.writeText(data); 
      showToast('season','セーブデータをクリップボードにコピーしました'); 
    }catch(e){ 
      const ta=document.createElement('textarea'); 
      ta.value=data; 
      document.body.appendChild(ta); 
      ta.select(); 
      try{ document.execCommand('copy'); }catch(_){} 
      ta.remove(); 
      showToast('season','セーブデータをテキストエリアにコピーしました');
    } 
  });
  $('load-btn').addEventListener('click',()=>{ 
    const s=prompt('セーブ文字列を貼り付け（ALIFE2:）'); 
    if(s) restore(s.trim()); 
  });

  // ===== Boot =====
  function boot(){ 
    try {
      toastBlockUntil = frame + 600; 
      initPopulation(24); 
      seedPatches(); 
      if(window.env) window.env.seedFromPatches(patches);
      seedPlankton(); 
      addFood(40,10); 
      reportMix(); 
      $('start-btn').disabled=false; 
      $('pause-btn').disabled=true; 
      initChallenges(); 
      log('◆ Symbolic Shapes v1: 図形の連なり・分岐・核・透明グラデーションで個体差を表現'); 
      running=false;
    } catch(e){
      const dbg=$('debug-console'); dbg.style.display='block'; dbg.textContent='Boot error: '+ (e?.message||e);
      console.error('Boot error', e);
    }
  }
  boot();
  loop();
})();
</script>
</body>
